services:
  - type: web
    name: ai-coding-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port 8000
    envVars:
      - key: OPENAI_API_KEY
        scope: run
        sync: false
  
  - type: web
    name: ai-coding-frontend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/main.py --server.port=8501 --server.address=0.0.0.0
    envVars:
      - key: BACKEND_URL
        scope: run
        value: https://ai-coding-backend.onrender.com
        sync: false